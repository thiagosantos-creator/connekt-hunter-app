services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: connekt
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports: ["9000:9000", "9001:9001"]

  api:
    image: node:22
    working_dir: /app
    volumes: [".:/app"]
    command: sh -c "corepack enable && CI=true pnpm install --frozen-lockfile && pnpm --filter @connekt/db prisma:generate && pnpm --filter api dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/connekt
      PORT: 3000
    ports: ["3000:3000"]
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: node:22
    working_dir: /app
    volumes: [".:/app"]
    command: sh -c "corepack enable && CI=true pnpm install --frozen-lockfile && pnpm --filter @connekt/db prisma:generate && pnpm --filter worker dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/connekt
    depends_on:
      postgres:
        condition: service_healthy
