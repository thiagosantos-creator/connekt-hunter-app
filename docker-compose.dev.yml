services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: connekt
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniopassword}
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  workspace-bootstrap:
    image: node:22
    working_dir: /app
    volumes:
      - .:/app
      - workspace_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      CI=true pnpm install --frozen-lockfile &&
      pnpm --filter @connekt/db prisma:generate &&
      pnpm --filter @connekt/db exec prisma migrate deploy &&
      pnpm --filter @connekt/db prisma:seed"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/connekt
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: node:22
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
      - workspace_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm exec tsx --tsconfig apps/api/tsconfig.json apps/api/src/main.ts"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/connekt
      PORT: 3000
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-miniopassword}
    ports: ["3000:3000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      workspace-bootstrap:
        condition: service_completed_successfully

  worker:
    image: node:22
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
      - workspace_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm exec tsx --tsconfig apps/worker/tsconfig.json apps/worker/src/main.ts"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/connekt
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-miniopassword}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      workspace-bootstrap:
        condition: service_completed_successfully

  backoffice-web:
    image: node:22
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
      - workspace_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --filter backoffice-web exec vite --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_CANDIDATE_WEB_URL: ${VITE_CANDIDATE_WEB_URL:-http://localhost:5174}
      CHOKIDAR_USEPOLLING: "true"
    ports: ["5173:5173"]
    depends_on:
      workspace-bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started

  candidate-web:
    image: node:22
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
      - workspace_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --filter candidate-web exec vite --host 0.0.0.0 --port 5174"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_CANDIDATE_WEB_URL: ${VITE_CANDIDATE_WEB_URL:-http://localhost:5174}
      CHOKIDAR_USEPOLLING: "true"
    ports: ["5174:5174"]
    depends_on:
      workspace-bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  workspace_node_modules:
  pnpm_store:
